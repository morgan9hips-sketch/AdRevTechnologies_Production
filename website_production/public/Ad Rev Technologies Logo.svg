<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo mark: Ad Rev Technologies -->
  <g id="logo-mark">
    <!-- Circular background with professional gradient -->
    <circle cx="24" cy="24" r="22" fill="url(#gradient-blue)" stroke="#1D4ED8" stroke-width="2"/>
    
    <!-- Modern "AR" monogram -->
    <text x="24" y="30" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="800" 
          fill="#FFFFFF" text-anchor="middle">AR</text>
  </g>
  
  <!-- Wordmark: Ad Rev Technologies -->
  <g id="wordmark" transform="translate(56, 24)">
    <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1F2937">
      Ad Rev Technologies
    </text>
  </g>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradient-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>